<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<body>
    <div class="icons">
        <a href="https://www.youtube.com/@ufc">
            <div class="circle">
                <i class="fab fa-youtube"></i>
            </div>
        </a>
        <a href="https://www.facebook.com/UFC/">
            <div class="circle">
                <i class="fab fa-facebook"></i>
            </div>
        </a>
        <a href="https://www.instagram.com/ufc/">
            <div class="circle">
                <i class="fab fa-instagram"></i>
            </div>
        </a>
        <a href="../AboutUs/Credits.html">
            <div class="circle">
                <i class="fas fa-location-arrow"></i>
            </div>
        </a>

    <form class="login-form">
        <h1>Login Screen</h1>
        <input type="text" class="tpbox" placeholder="Username...">

        <div class="btn-group">

            <input type="button" class="btn" value="Sign Up">
